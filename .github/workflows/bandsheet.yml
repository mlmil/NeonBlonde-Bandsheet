name: Update Band Sheet
on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'
jobs:
  bandsheet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install gws CLI
        run: |
          curl -L https://github.com/joshdk/gws/releases/download/v0.23.0/gws-linux-amd64 -o gws
          chmod +x gws
          sudo mv gws /usr/local/bin/
          gws version
      - run: python3 generate_bandsheet.py
      - run: |
          git config user.name "Bot"
          git config user.email "bot@neon.com"
          git add bandsheet-data.json
          git commit -m "Update Band Sheet" || true
          git push || true
