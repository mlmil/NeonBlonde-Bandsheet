name: Update Band Sheet
on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'
jobs:
  bandsheet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install gws CLI
        run: go install github.com/joshdk/gws@latest
      - run: python3 generate_bandsheet.py
        env:
          PATH: /home/runner/go/bin:${{ env.PATH }}
      - run: |
          git config user.name "Bot"
          git config user.email "bot@neon.com"
          git add bandsheet-data.json
          git commit -m "Update Band Sheet" || true
          git push || true
