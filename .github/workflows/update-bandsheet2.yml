name: Update Band Sheet                                               
  on:                                                                   
    schedule:   
      - cron: '0 14 * * *'                                              
    workflow_dispatch:                        
  jobs:                                   
    update:     
      runs-on: ubuntu-latest                                            
      steps:                                  
        - uses: actions/checkout@v4                                     
        - uses: actions/setup-python@v5       
          with:                                                         
            python-version: '3.11'
        - run: pip install -r requirements.txt                          
        - run: python3 generate_bandsheet.py  
          env:                                                          
            NEON_TOKEN_JSON: ${{ secrets.NEON_TOKEN_JSON }}
            NEON_CLIENT_SECRETS_JSON: ${{                               
  secrets.NEON_CLIENT_SECRETS_JSON }}         
        - run: git config user.name "Band Sheet Bot" && git config      
  user.email "neon-bot@neonblonde.com" && git add bandsheet-data.json &&
   git commit -m "Update" && git push || echo "No changes"    
