name: Update Band Sheet
on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - env:
          NEON_TOKEN_JSON: ${{ secrets.NEON_TOKEN_JSON }}
          NEON_CLIENT_SECRETS_JSON: ${{ secrets.NEON_CLIENT_SECRETS_JSON }}
        run: python3 generate_bandsheet.py
      - run: |
          git config user.name "Band Sheet Bot"
          git config user.email "neon-bot@neonblonde.com"
          if git diff --exit-code bandsheet-data.json >/dev/null 2>&1; then
            echo "No changes"
          else
            git add bandsheet-data.json
            git commit -m "Update Band Sheet - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
